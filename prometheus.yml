global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'worker'
    static_configs:
      - targets: ['crawler:2112']
  
  - job_name: 'search'
    static_configs:
      - targets: ['search:8080']

  - job_name: 'embedder'
    static_configs:
      - targets: ['embedder:8000']
