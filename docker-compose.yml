version: '3.8'
services:
  message_broker:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 3

  state_store:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  vector_store:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vortex
      POSTGRES_PASSWORD: vortex
      POSTGRES_DB: vortex
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortex"]
      interval: 10s
      timeout: 5s
      retries: 3

  seeder:
    build:
      context: .
      args:
        SERVICE: seeder
    restart: on-failure
    depends_on:
      message_broker:
        condition: service_healthy
      state_store:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    env_file: .env

  crawler:
    build:
      context: .
      args:
        SERVICE: worker
    restart: unless-stopped
    depends_on:
      message_broker:
        condition: service_healthy
      state_store:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    env_file: .env

  search:
    build:
      context: .
      dockerfile: cmd/search/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      vector_store:
        condition: service_healthy
      embedder:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    env_file: .env
    environment:
      SEARCH_EMBED_URL: http://embedder:8000/embed
      POSTGRES_URL: postgres://vortex:vortex@vector_store:5432/vortex
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  embedder:
    build: ./worker-py
    restart: unless-stopped
    depends_on:
      message_broker:
        condition: service_healthy
      vector_store:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@message_broker:5672/
      POSTGRES_URL: postgresql://vortex:vortex@vector_store:5432/vortex
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  
volumes:
  pgdata:
  redisdata: