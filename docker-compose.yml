version: '3.8'
services:
  message_broker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
  
  state_store:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  vector_store:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vortex
      POSTGRES_PASSWORD: vortex
      POSTGRES_DB: vortex
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  
  seeder:
    build:
      context: .
      args:
        SERVICE: seeder
    depends_on:
      - message_broker
      - state_store
    env_file: .env

  crawler:
    build:
      context: .
      args:
        SERVICE: worker
    depends_on:
      - message_broker
      - state_store
    env_file: .env

  search:
    build:
      context: .
      dockerfile: cmd/search/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - vector_store
      - embedder
    env_file: .env
    environment:
      SEARCH_EMBED_URL: http://embedder:8000/embed
      POSTGRES_URL: postgres://vortex:vortex@vector_store:5432/vortex

  embedder:
    build: ./worker-py
    depends_on:
      - message_broker
      - vector_store
    environment:
      RABBITMQ_URL: amqp://guest:guest@message_broker:5672/
      POSTGRES_URL: postgresql://vortex:vortex@vector_store:5432/vortex
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  
volumes:
  pgdata:
  redisdata: