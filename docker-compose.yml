version: '3.8'
services:
  message_broker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
  
  state_store:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  vector_store:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vortex
      POSTGRES_PASSWORD: vortex
      POSTGRES_DB: vortex
    volumes:
      - pgdata:/var/lib/postgresql/data
  
volumes:
  pgdata:
  redisdata: